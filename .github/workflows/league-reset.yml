name: Weekly League Reset
on:
  schedule:
    - cron: '55 23 * * 0' # Every Sunday at 11:55 PM
jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Reset Script
        run: |
          curl -X POST https://your-railway-url.app/api/admin/reset-leagues \
          -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}"
